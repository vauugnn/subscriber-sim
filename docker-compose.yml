services:
  chat:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # SQLite DB persisted to ./data/ on the host (already gitignored via data/*)
      - ./data:/app/data
    environment:
      # ── Backend: "mlx" = local mlx_lm.server (run start_mlx_server.sh first)
      #            "modal" = Modal GPU (set MODAL_TOKEN_* below)
      - INFERENCE_BACKEND=mlx
      - MLX_SERVER_URL=http://host.docker.internal:8080
      # ── Modal auth (only needed when INFERENCE_BACKEND=modal)
      - MODAL_TOKEN_ID=${MODAL_TOKEN_ID:-}
      - MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET:-}
      - DB_PATH=/app/data/chat.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

[server]
port = 8501
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10
runOnSave = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
base = "dark"
primaryColor = "#e91e8c"
backgroundColor = "#0e0e0e"
secondaryBackgroundColor = "#1a1a1a"
textColor = "#f0f0f0"
font = "sans serif"

[logger]
level = "warning"

[runner]
fastReruns = true
